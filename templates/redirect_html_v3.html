<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>綠界轉跳商城</title>
</head>
<body>
<div class="container">
    <h2>綠界轉跳商城........</h2>
    <!-- 修改處: 將 id 改為 class 並用 data-payload 儲存訂單付款資料 -->
    <button id="pay-btn" class="pay-btn" data-payload='{{ payment_payload|safe }}'>
       付款完成-前往商城
    </button>

    {% csrf_token %}
    <script>
        function getCSRFToken() {
            return document.querySelector('[name=csrfmiddlewaretoken]').value
        }

        // 修改處: 使用 class 選擇器綁定多個按鈕事件
        document.addEventListener("DOMContentLoaded", function(){
            const buttons = document.querySelectorAll(".pay-btn");  // 選取所有付款按鈕
            buttons.forEach(btn => {
                btn.addEventListener("click", function(){
                    const payload = JSON.parse(this.dataset.payload);  // 讀取對應的 payload
                    fetch("http://127.0.0.1:8000/commerce_shop/payment_ok/", {
                        method: "POST",
                        credentials: "include",
                        headers: {
                            "X-CSRFToken": getCSRFToken(),
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify(payload)
                    })
                    .then(res => res.text())
                    .then(html => {
                        document.open();
                        document.write(html);
                        document.close();
                    })
                    .catch(err => console.error(err));
                });
            });
        });
        //document.getElementById('pay-btn').onclick();
    </script>
</div>

</body>
</html>
