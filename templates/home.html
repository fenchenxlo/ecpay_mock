<!DOCTYPE html>
<html lang="zh-Hant">
<head><meta charset="UTF-8"><title>ECPay Mock</title></head>
<body>
    <h1>此為綠界模擬查詢DB服務</h1>
    {% if user.is_authenticated and user.is_superuser %}
        <p>歡迎，{{ user.username }}（管理員）</p>
        <p><a href="{% url 'db_query_tool' %}">🔍 資料庫查詢工具</a></p>
        <p><a href="{% url 'admin:logout' %}">登出</a></p>
    {% else %}
        <p><a href="/admin/login/?next=/">管理員登入</a></p>
    {% endif %}
</body>
</html>
